<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVFLIX</title>
    <link rel="stylesheet" href="catalogo.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navbar -->
    <header class="navbar" id="navbar">
        <div class="navbar-left">
            <a href="https://www.linkedin.com/in/joe-monteiro" target="_blank">
                <img class="logo" src="../assets/logo.png" alt="DEVFLIX">
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="https://www.alura.com.br/" class="active">Início</a></li>
                    <li><a href="https://www.alura.com.br/">Em loop</a></li>
                    <li><a href="https://www.alura.com.br/">Deployados</a></li>
                    <li><a href="https://www.alura.com.br/">Side Projects</a></li>
                    <li><a href="https://www.alura.com.br/">Trending</a></li>
                    <li><a href="https://www.alura.com.br/">Meu backlog</a></li>
                </ul>
            </nav>
        </div>
        <div class="navbar-right">
            <i class="fas fa-search icon"></i>
            <a href="../index.html" class="kids-link">Seu nome</a>
            <div class="nav-notification">
                <i class="fas fa-bell icon"></i>
                <span class="notification-badge">42</span>
            </div>
            <a href="../index.html" class="profile-menu" style="text-decoration: none; color: inherit;">
                <img class="profile-icon" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png"
                    alt="Profile">
                <i class="fas fa-caret-down icon" style="font-size: 14px; margin-left: 5px;"></i>
            </a>
        </div>
    </header>

    <!-- Hero Banner -->
    <section class="hero-banner">
        <img class="hero-img" src="../assets/cinema.png.png" alt="Cinema">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Bem-vindo à DEVFLIX</h1>
            <p>O catálogo de quem vive entre bugs e boas histórias.</p>
        </div>
    </section>

    <!-- Sliders Container -->
    <main class="sliders-container" id="main-content">
        <!-- Javascript will inject the rows here -->
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <a href="https://www.alura.com.br/" target="_blank">
                <p>Imersão Alura AI</p>
            </a>
            <ul class="footer-links">
                <li><a href="https://github.com/joe-monteiro" target="_blank">GitHub</a></li>
                <li><a href="https://www.linkedin.com/in/joe-monteiro" target="_blank">LinkedIn</a></li>
                <li><a href="mailto:monteirojoe94@email.com" target="_blank">Contato</a></li>
            </ul>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
    <script>
        const profile = JSON.parse(localStorage.getItem('activeProfile'));
        if (profile) {
            document.querySelector('.kids-link').textContent = profile.name;
            document.querySelector('.profile-icon').src = profile.img;
        }
    </script>
</body>

</html>
